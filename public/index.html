<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="login-div-index">
      <input
        id="username_input"
        class="username-index"
        type="text"
        placeholder="Username"
      />
      <input
        id="password_input"
        class="password-index"
        type="password"
        placeholder="Password"
      />
      <div class="lower-div-index">
        <a id="login_button" class="login-index">Login</a>
        <a id="register-button" class="register-index">Register</a>
      </div>
      <div id="message"></div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
