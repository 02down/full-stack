<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Account</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container-account">
        <div class="header-account">Welcome <span id="account-username"></span></div>
        <img class="placeholder-img-account" src="img/placeholder.jpg" alt="Profile Image">
        <div class="input-account">    
            <input class="username-index" type="text" placeholder="Username">
            <input class="password-index" type="password" placeholder="Password"> 
            <button class="save-account">Save</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
